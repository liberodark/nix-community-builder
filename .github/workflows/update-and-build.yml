name: update-builders
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake
        run: nix flake update

      - name: Format Nix files with nixfmt-tree
        run: nix run nixpkgs#nixfmt-tree -- .

      - name: Check flake
        run: nix flake check

      - uses: EndBug/add-and-commit@v10
        with:
          add: |
            flake.lock
            **/*.nix
          message: "chore: Update flake.lock and format nix files"
