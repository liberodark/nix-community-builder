name: lint
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deadnix:
    name: deadnix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Scan for dead Nix code
        run: nix run nixpkgs#deadnix -- --fail .
